name: Nucleation CI/CD

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # diplomat-tool from our fork (adds the PHP backend); pinned by branch.
  DIPLOMAT_TOOL_GIT: https://github.com/Nano112/diplomat
  DIPLOMAT_TOOL_BRANCH: nanobind-public-api

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine version
        id: version
        run: |
          CARGO_VERSION=$(grep -m1 'version = ' Cargo.toml | cut -d '"' -f2)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
              echo "Tag $TAG_VERSION does not match Cargo.toml version $CARGO_VERSION" >&2
              exit 1
            fi
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$CARGO_VERSION" >> $GITHUB_OUTPUT
      - name: Check version is in sync across packaging
        run: |
          CARGO_VERSION=$(grep -m1 'version = ' Cargo.toml | cut -d '"' -f2)
          PYTHON_VERSION=$(grep -m1 '^version = ' bindings/python/pyproject.toml | cut -d '"' -f2)
          if [[ "$PYTHON_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error file=bindings/python/pyproject.toml::version $PYTHON_VERSION != Cargo.toml $CARGO_VERSION"
            exit 1
          fi

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test
      - name: Build the bridge surface
        run: cargo build --lib --features bridge

  # The structural replacement for the old regex parity linters: the committed
  # bindings must regenerate byte-identically from src/bridge (fresh + deterministic),
  # and the bridge must cover the entire pre-migration FFI surface.
  bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install diplomat-tool (fork with PHP backend)
        run: cargo install --git $DIPLOMAT_TOOL_GIT --branch $DIPLOMAT_TOOL_BRANCH diplomat-tool
      - name: Bindings are fresh (regenerate == committed)
        run: |
          ./tools/gen-bindings.sh
          git diff --exit-code -- bindings
      - name: Bindings are deterministic (two passes identical)
        run: |
          cp -r bindings /tmp/pass1
          ./tools/gen-bindings.sh
          diff -r /tmp/pass1 bindings
      - name: Bridge covers the pre-migration FFI surface
        run: python3 tools/check_bridge_coverage.py

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PHP with FFI
        run: |
          sudo apt-get update && sudo apt-get install -y php-cli lld
          php -m | grep -i ffi
      - name: C smoke
        run: ./examples/bridge_smoke/c/run.sh
        env: { CC: clang }
      - name: PHP smoke
        run: php -d ffi.enable=1 -r 'require "examples/bridge_smoke/php/main.php";'
        env:
          NUCLEATION_LIBRARY_PATH: target/release/libnucleation.so
      - name: JS smoke
        run: ./examples/bridge_smoke/js/run.sh
      - name: Python smoke
        run: ./examples/bridge_smoke/python/run.sh

  # Exercise the networked Store backends (S3/Redis/Postgres) against real
  # services. testcontainers spins throwaway containers via the runner's docker,
  # so no service-container declarations are needed.
  test-store-backends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-store-${{ hashFiles('**/Cargo.lock') }}
      - name: Store backend contract suites (testcontainers)
        run: |
          cargo test --features store-s3,store-redis,store-pg,store-testkit \
            --test store_testcontainers

  build-wasm:
    needs: [check-version, tests, bindings]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Assemble npm package
        run: |
          ./tools/package-npm.sh dist/npm
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('dist/npm/package.json', 'utf8'));
            pkg.version = '${{ needs.check-version.outputs.version }}';
            fs.writeFileSync('dist/npm/package.json', JSON.stringify(pkg, null, 2));
          "
      - uses: actions/upload-artifact@v4
        with:
          name: nucleation-npm-v${{ needs.check-version.outputs.version }}
          path: dist/npm

  build-nucleation:
    needs: [check-version, tests, bindings]
    strategy:
      matrix:
        include:
          # ubuntu-22.04 (glibc 2.35), NOT ubuntu-latest (24.04, glibc 2.39):
          # the release .so is loaded by consumers on older glibc — e.g.
          # schemat.io's Debian bookworm (2.36) containers, where a 2.38-linked
          # lib fails PHP FFI::cdef with "GLIBC_2.38 not found". 2.35 is a safe
          # floor. Applies to both the PHP-FFI .so and the JVM jar's JNA natives.
          - { platform: linux-x86_64,  os: ubuntu-22.04,  target: x86_64-unknown-linux-gnu }
          - { platform: linux-aarch64, os: ubuntu-22.04,  target: aarch64-unknown-linux-gnu }
          - { platform: macos-x86_64,  os: macos-latest,   target: x86_64-apple-darwin }
          - { platform: macos-aarch64, os: macos-latest,   target: aarch64-apple-darwin }
          - { platform: windows-x86_64, os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools (ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build nucleation native library (full bridge surface)
        # bridge-full, matching the wheels: the generated bindings reference the
        # entire surface, and downstream consumers (schemati's PHP layer) call
        # meshing through these exact release libs — a core-only artifact turns
        # those calls into missing-symbol errors at runtime.
        run: cargo build --release --lib --features bridge-full --target ${{ matrix.target }}
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp target/${{ matrix.target }}/release/*nucleation* out/ 2>/dev/null || true
          find out -maxdepth 1 -type d -mindepth 1 -exec rm -rf {} +
          cp -r bindings/c out/include
          cp -r bindings/php out/php
      - uses: actions/upload-artifact@v4
        with:
          name: nucleation-v${{ needs.check-version.outputs.version }}-${{ matrix.platform }}
          path: out

  build-python-wheels:
    needs: [check-version, tests, bindings]
    strategy:
      matrix:
        include:
          - { label: linux-x86_64,  os: ubuntu-latest }
          - { label: macos-aarch64, os: macos-latest }
          - { label: windows-x86_64, os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel (${{ matrix.label }})
        env:
          # bridge-full, not bridge: the generated sources bind the entire
          # surface, so the static lib must export every module's symbols
          # (macOS ld fails hard on the gap; ELF defers it to call time).
          NUCLEATION_FEATURES: bridge-full
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel bindings/python --outdir wheels
      - name: Repair linux wheel to manylinux
        if: matrix.label == 'linux-x86_64'
        # PyPI rejects plain linux_x86_64 tags; auditwheel grafts external
        # libs and retags to the runner's actual glibc floor.
        run: |
          python -m pip install auditwheel patchelf
          python -m auditwheel repair wheels/*.whl -w wheels-repaired
          rm wheels/*.whl
          mv wheels-repaired/*.whl wheels/
      - name: Install and exercise wheel (${{ matrix.label }})
        # Building green is not enough: a wheel can be missing native symbols
        # and still build fine (ELF defers unresolved symbols to call time —
        # exactly how a half-linked wheel once shipped green). Install into a
        # fresh venv and drive real calls, including the simulation surface
        # (Value), the symbols that went missing. Runs after the manylinux
        # repair so linux exercises the wheel that actually ships.
        shell: bash
        run: |
          python -m venv wheel-test-venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            VENV_PY=wheel-test-venv/Scripts/python.exe
          else
            VENV_PY=wheel-test-venv/bin/python
          fi
          "$VENV_PY" -m pip install --upgrade pip
          "$VENV_PY" -m pip install wheels/*.whl
          "$VENV_PY" - <<'EOF'
          import nucleation
          s = nucleation.Schematic.create("t")
          s.set_block_from_string(0, 0, 0, 'minecraft:chest[facing=west]{Items:[{Slot:0b,id:"minecraft:diamond",Count:64b}]}')
          name = s.get_block_name(0, 0, 0)
          assert name == "minecraft:chest", name
          m = nucleation.Value.from_u32(7)
          assert m.as_u32() == 7
          print("wheel functional check OK:", name)
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.label }}
          path: wheels/*.whl

  assemble-jvm-jar:
    # tests/bindings come transitively through build-nucleation.
    needs: [check-version, build-nucleation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Download all per-platform native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: nucleation-v${{ needs.check-version.outputs.version }}-*
          path: native-libs
      - name: Stage cdylibs into JNA resources
        # One jar that works on every supported platform: bundle each
        # build-nucleation cdylib under the JNA resource prefix for its
        # platform (JNA extracts <prefix>/<libname> from the classpath at
        # Native.load time). NOTE: build-nucleation ships the core `bridge`
        # surface, so calls into the opt-in modules (simulation/meshing/
        # rendering) raise UnsatisfiedLinkError at call time — consumers
        # needing those build their own cdylib, same as with the C artifacts.
        # (Before this, the jar bundled a single bridge-full linux-x86-64 .so
        # and was broken everywhere else.)
        run: |
          version='${{ needs.check-version.outputs.version }}'
          res=bindings/kotlin/src/main/resources
          stage() { # <build-nucleation platform> <JNA prefix> <library filename>
            src="native-libs/nucleation-v${version}-$1/$3"
            if [[ ! -f "$src" ]]; then
              echo "::error::expected native library missing: $src"
              find native-libs -maxdepth 2 -print
              exit 1
            fi
            mkdir -p "$res/$2"
            cp "$src" "$res/$2/$3"
          }
          stage linux-x86_64   linux-x86-64   libnucleation.so
          stage linux-aarch64  linux-aarch64  libnucleation.so
          stage macos-x86_64   darwin-x86-64  libnucleation.dylib
          stage macos-aarch64  darwin-aarch64 libnucleation.dylib
          stage windows-x86_64 win32-x86-64   nucleation.dll
          find "$res" -type f -print
      - name: Build JAR from generated Kotlin
        working-directory: bindings/kotlin
        run: gradle jar -PnucleationVersion=${{ needs.check-version.outputs.version }} --no-daemon
      - name: JVM smoke (run the assembled jar on this runner)
        # smoke/Smoke.kt runs with the jar first on the classpath: JNA must
        # extract linux-x86-64/libnucleation.so from the jar itself and the
        # core schematic calls must work, so a jar with missing or broken
        # bundled natives can't ship green.
        working-directory: bindings/kotlin
        run: gradle smokeRun -PnucleationVersion=${{ needs.check-version.outputs.version }} --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: nucleation-jvm-jar-v${{ needs.check-version.outputs.version }}
          path: bindings/kotlin/build/libs/*.jar

  publish:
    needs: [check-version, build-wasm, build-nucleation, build-python-wheels, assemble-jvm-jar, smoke]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: nucleation-npm-v${{ needs.check-version.outputs.version }}
          path: npm-pkg
      - name: Download all nucleation native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: nucleation-v${{ needs.check-version.outputs.version }}-*
          path: release-artifacts
      - name: Download JVM JAR
        uses: actions/download-artifact@v4
        with:
          name: nucleation-jvm-jar-v${{ needs.check-version.outputs.version }}
          path: release-artifacts

      - name: Publish to crates.io (git-only features stripped)
        # crates.io can't take the MCHPRS git deps, so the published crate
        # ships without simulation; use the git dependency to get it.
        # strip-git-deps.py rewrites Cargo.toml accordingly. meshing and
        # rendering survive: schematic-mesher is published to crates.io
        # (via publish-mesher.yml) and its dep is dual version+git, which
        # cargo publish resolves to the version side on its own.
        run: |
          python3 tools/strip-git-deps.py
          cargo publish --allow-dirty --token ${{ secrets.CRATES_IO_TOKEN }}
          git checkout Cargo.toml
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish npm package
        # Skip-if-published so a partially-failed release run can be retried
        # (npm hard-fails on republishing an existing version).
        run: |
          cd npm-pkg
          VERSION=$(node -p "require('./package.json').version")
          if npm view "nucleation@$VERSION" version >/dev/null 2>&1; then
            echo "nucleation@$VERSION already on npm; skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Download all Python wheels
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          path: python-dist
          merge-multiple: true
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Publish Python wheels to PyPI
        run: |
          python -m pip install --upgrade pip twine
          python -m twine upload --non-interactive --skip-existing python-dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Archive release artifacts
        # One zip per platform tree instead of hundreds of loose header/php
        # files — the flat upload is unusable as a release and its burst of
        # per-asset API calls trips GitHub's secondary rate limit.
        run: |
          mkdir release-assets
          for d in release-artifacts/*/ ; do
            base=$(basename "$d")
            (cd "$d" && zip -qr "$GITHUB_WORKSPACE/release-assets/${base}.zip" .)
          done
          find release-artifacts -maxdepth 1 -type f -exec cp {} release-assets/ \;
          ls -l release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
